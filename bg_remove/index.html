<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Humonii Toolkit | BG Remove</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/tool-page.css" />
</head>
<body>
  <div class="topbar">
    <a class="brand" href="../index.html">← Humonii Toolkit</a>
  </div>

  <main class="container">
    <section class="hero">
      <span class="badge">Image Tool</span>
      <h1>Background Remover</h1>
      <p>一般物体にも対応した背景透過を行い、透過PNGとして保存します。</p>
    </section>

    <section class="grid">
      <aside class="panel">
        <h2>Settings</h2>
        <label for="file">画像ファイル</label>
        <input id="file" type="file" accept="image/*" />

        <label for="th">エッジしきい値: <span id="th-val">0.65</span></label>
        <input id="th" type="range" min="0.3" max="0.95" step="0.01" value="0.65" />

        <div style="margin-top:12px; display:grid; gap:8px;">
          <button id="run">Remove Background</button>
          <button id="download" class="alt" disabled>Download PNG</button>
        </div>

        <p class="hint" id="status">画像を選択してください。</p>
      </aside>

      <section class="panel">
        <h2>Result</h2>
        <div class="preview">
          <canvas id="canvas"></canvas>
        </div>
      </section>
    </section>
  </main>

  <script type="module">
    import { removeBackground } from 'https://cdn.jsdelivr.net/npm/@imgly/background-removal/+esm';

    const fileInput = document.getElementById('file');
    const runBtn = document.getElementById('run');
    const dlBtn = document.getElementById('download');
    const statusEl = document.getElementById('status');
    const thInput = document.getElementById('th');
    const thVal = document.getElementById('th-val');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let imageEl = null;
    let loadedFile = null;

    thInput.addEventListener('input', () => {
      thVal.textContent = Number(thInput.value).toFixed(2);
    });

    fileInput.addEventListener('change', () => {
      const file = fileInput.files?.[0];
      if (!file) return;
      loadedFile = file;
      const url = URL.createObjectURL(file);
      imageEl = new Image();
      imageEl.src = url;
      imageEl.onload = () => {
        canvas.width = imageEl.width;
        canvas.height = imageEl.height;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(imageEl, 0, 0);
        statusEl.textContent = '画像を読み込みました。Remove Background を押してください。';
      };
    });

    runBtn.addEventListener('click', async () => {
      if (!imageEl || !loadedFile) {
        statusEl.textContent = '先に画像を選択してください。';
        return;
      }

      runBtn.disabled = true;
      dlBtn.disabled = true;
      statusEl.textContent = '背景抽出中...';

      try {
        const resultBlob = await removeBackground(loadedFile, {
          output: {
            format: 'image/png',
            quality: 0.92,
          },
          progress: (key, current, total) => {
            if (typeof current === 'number' && typeof total === 'number' && total > 0) {
              const pct = Math.round((current / total) * 100);
              statusEl.textContent = `背景抽出中... ${key} ${pct}%`;
            }
          },
        });

        const outUrl = URL.createObjectURL(resultBlob);
        const outImg = new Image();
        outImg.src = outUrl;
        await outImg.decode();

        canvas.width = outImg.width;
        canvas.height = outImg.height;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(outImg, 0, 0);

        // Optional alpha threshold pass.
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;
        const th = Number(thInput.value) * 255;
        for (let i = 0; i < data.length; i += 4) {
          const a = data[i + 3];
          data[i + 3] = a >= th ? 255 : 0;
        }
        ctx.putImageData(imgData, 0, 0);

        dlBtn.disabled = false;
        statusEl.textContent = '完了しました。透過PNGをダウンロードできます。';
      } catch (error) {
        statusEl.textContent = `背景抽出に失敗しました: ${error.message}`;
      } finally {
        runBtn.disabled = false;
      }
    });

    dlBtn.addEventListener('click', () => {
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = 'bg-removed.png';
      document.body.appendChild(a);
      a.click();
      a.remove();
    });
  </script>
</body>
</html>
