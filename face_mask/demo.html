<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Mosaicker</title>
    
    <!-- MediaPipe Face Detection の読み込み -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg-color: #1e1e1e;
            --sidebar-color: #252526;
            --accent-color: #007acc;
            --text-color: #cccccc;
            --border-color: #3e3e42;
        }

        body {
            margin: 0; padding: 0; display: flex; height: 100vh;
            background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* サイドバー */
        #sidebar {
            width: 320px; background-color: var(--sidebar-color);
            border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; padding: 20px; box-sizing: border-box;
        }

        h2 { font-size: 1.2rem; margin-top: 0; color: #fff; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        
        /* ドラッグ＆ドロップエリア */
        #drop-zone {
            border: 2px dashed #666; border-radius: 8px; padding: 40px 10px;
            text-align: center; cursor: pointer; transition: all 0.3s;
            background: rgba(255, 255, 255, 0.02); margin-bottom: 20px;
        }
        #drop-zone.dragover { border-color: var(--accent-color); background: rgba(0, 122, 204, 0.1); }

        /* メインエリア */
        #main {
            flex-grow: 1; display: flex; flex-direction: column; position: relative;
        }

        #canvas-container {
            flex-grow: 1; display: flex; align-items: center; justify-content: center;
            padding: 40px;
            background-image: 
                linear-gradient(45deg, #181818 25%, transparent 25%), 
                linear-gradient(-45deg, #181818 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #181818 75%), 
                linear-gradient(-45deg, transparent 75%, #181818 75%);
            background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        canvas {
            max-width: 100%; max-height: 100%;
            box-shadow: 0 0 30px rgba(0,0,0,0.5); background-color: #000;
        }

        /* ステータスバーとログ */
        #log-panel {
            height: 120px; background: #111; border-top: 1px solid var(--border-color);
            padding: 10px; font-family: monospace; font-size: 0.85rem;
            overflow-y: auto; color: #888;
        }
        .log-entry { margin-bottom: 4px; }
        #status-bar {
            height: 30px; background-color: #2f934b; color: white;
            display: flex; align-items: center; padding: 0 15px; font-size: 0.8rem;
            position: relative; transition: background-color 0.3s ease;
        }
        #status-bar.processing {
            background-color: #1a1a1a;
        }
        #progress-container {
            position: absolute; left: 0; top: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
        }
        #progress-bar {
            width: 0%; height: 100%; background: linear-gradient(90deg, rgba(47, 147, 75, 0.8), rgba(47, 147, 75, 0.6));
            transition: width 0.1s ease-out;
            box-shadow: inset 0 0 0 1px rgba(47, 147, 75, 0.3);
        }
        #status-text {
            position: relative; z-index: 1;
        }
        #mode-panel {
            margin-top: 10px;
            margin-bottom: 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            font-size: 0.78rem;
            color: #cfcfcf;
            line-height: 1.45;
        }
        .mode-row {
            display: flex;
            justify-content: space-between;
            gap: 8px;
        }
        .mode-key {
            color: #9fb7d8;
            white-space: nowrap;
        }
        .mode-value {
            color: #fff;
            text-align: right;
            word-break: break-word;
        }

        /* 非表示のVideo要素 */
        video { display: none; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Face Mosaicker</h2>
        
        <div id="drop-zone">
            <strong>動画をドロップ</strong><br>
            <span style="font-size: 0.8rem;">（.mp4, .webm 等）</span>
        </div>

        <div style="display: grid; gap: 8px; margin-bottom: 16px;">
            <button id="download-processed-btn" disabled style="height: 36px; border: 0; border-radius: 8px; background: #2f934b; color: #fff; font-weight: 700; cursor: pointer;">処理後動画を保存</button>
            <span id="export-hint" style="font-size: 0.78rem; color: #999;">動画処理完了後に保存できます。</span>
        </div>

        <div id="mode-panel">
            <div class="mode-row"><span class="mode-key">検出モード</span><span id="mode-detector" class="mode-value">初期化中</span></div>
            <div class="mode-row"><span class="mode-key">実行プロバイダ</span><span id="mode-provider" class="mode-value">未確定</span></div>
            <div class="mode-row"><span class="mode-key">SCRFD稼働</span><span id="mode-scrfd" class="mode-value">未初期化</span></div>
            <div class="mode-row"><span class="mode-key">出力形式</span><span id="mode-output" class="mode-value">未確定</span></div>
        </div>

        <div style="margin-top: auto; font-size: 0.85rem; color: #888;">
            <p>※顔検出領域にモザイクを適用するモードです。</p>
            <p><a href="../index.html" style="color: #7cc7ff;">← Tool Atelier に戻る</a></p>
        </div>
    </div>

    <div id="main">
        <div id="canvas-container">
            <canvas id="output-canvas" width="800" height="450"></canvas>
        </div>

        <div id="log-panel"></div>

        <div id="status-bar">
            <div id="progress-container">
                <div id="progress-bar"></div>
            </div>
            <div id="status-text">システム起動中...</div>
        </div>
    </div>

    <video id="input-video" muted playsinline></video>

    <script>
        const video = document.getElementById('input-video');
        const canvas = document.getElementById('output-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const dropZone = document.getElementById('drop-zone');
        const logPanel = document.getElementById('log-panel');
        const statusBar = document.getElementById('status-bar');
        const statusText = document.getElementById('status-text');
        const progressBar = document.getElementById('progress-bar');
        const downloadProcessedBtn = document.getElementById('download-processed-btn');
        const exportHint = document.getElementById('export-hint');
        const modeDetector = document.getElementById('mode-detector');
        const modeProvider = document.getElementById('mode-provider');
        const modeScrfd = document.getElementById('mode-scrfd');
        const modeOutput = document.getElementById('mode-output');
        const DISPLAY_SCORE_THRESHOLD = 0.15;
        const SCRFD_MODEL_URL = './models/det_500m.onnx';
        const DRAW_BBOX_OUTLINE = false;
        const MOSAIC_MIN_BLOCK = 3;
        const MOSAIC_MAX_BLOCK = 20;
        const MOSAIC_DIVISOR = 25;
        const FACE_BLUR_RADIUS = 6;
        const EDGE_FEATHER_RATIO = 0.18;
        const FACE_EXPAND_X_RATIO = 0.18;
        const FACE_EXPAND_TOP_RATIO = 0.28;
        const FACE_EXPAND_BOTTOM_RATIO = 0.18;
        const OUTPUT_CAPTURE_FPS = 60;
        const MIN_VIDEO_BITRATE = 4_000_000;
        const MAX_VIDEO_BITRATE = 35_000_000;
        const AUDIO_BITRATE = 192_000;

        const modeParam = new URLSearchParams(window.location.search).get('mode');
        const DETECTOR_MODE = modeParam || 'candidate_scrfd';

        let isProcessing = false;
        let evaluation = null;
        let detector = null;
        let mediaRecorder = null;
        let processedOutputHandle = null;
        let processedOutputWriter = null;
        let processedOutputWriteChain = Promise.resolve();
        let processedOutputBytes = 0;
        let processedOutputMimeType = '';
        let processedOutputExtension = '.webm';
        let sourceVideoExtension = '.webm';
        let processedOutputBlob = null;
        let inputVideoUrl = null;
        let sourceVideoFileHandle = null;
        let activeDetectorModeLabel = '初期化中';
        let activeProviderLabel = '未確定';
        let scrfdSessionReady = false;
        let scrfdLastDetections = 0;
        let scrfdNoDetectionStreak = 0;
        let scrfdLastError = '';
        let frameSnapshotCanvas = null;
        let frameSnapshotCtx = null;

        function pickWebmMimeType() {
            const candidates = [
                'video/webm;codecs=vp9,opus',
                'video/webm;codecs=vp8,opus',
                'video/webm',
            ];
            for (const mime of candidates) {
                if (window.MediaRecorder && MediaRecorder.isTypeSupported(mime)) return mime;
            }
            return '';
        }

        function getDetectorModeLabel(mode) {
            if (mode === 'candidate_scrfd' || mode === 'candidate_scrfd_500m') return 'SCRFD';
            if (mode === 'baseline_mediapipe') return 'MediaPipe';
            return mode || '不明';
        }

        function updateModePanel() {
            modeDetector.innerText = activeDetectorModeLabel;
            modeProvider.innerText = activeProviderLabel;
            if (activeDetectorModeLabel.includes('SCRFD')) {
                const status = scrfdSessionReady ? '稼働中' : '未接続';
                const errText = scrfdLastError ? ` / err:${scrfdLastError}` : '';
                modeScrfd.innerText = `${status} / det:${scrfdLastDetections} / zero:${scrfdNoDetectionStreak}${errText}`;
            } else {
                modeScrfd.innerText = 'N/A';
            }
            const outputExt = sourceVideoExtension || processedOutputExtension || '.webm';
            const outputMime = toPickerMimeType(processedOutputMimeType || 'video/webm');
            modeOutput.innerText = `${outputExt} (${outputMime})`;
        }

        function resetExportState() {
            if (processedOutputWriter) {
                try {
                    processedOutputWriter.close();
                } catch (_) {}
            }
            processedOutputHandle = null;
            processedOutputWriter = null;
            processedOutputWriteChain = Promise.resolve();
            processedOutputBytes = 0;
            processedOutputMimeType = '';
            processedOutputExtension = '.webm';
            processedOutputBlob = null;
            downloadProcessedBtn.disabled = true;
            downloadProcessedBtn.textContent = '処理後動画を保存';
            exportHint.textContent = '動画処理完了後に保存できます。';
            updateModePanel();
        }

        function getBaseOutputName() {
            let baseName = 'mosaicked';
            let ext = sourceVideoExtension || processedOutputExtension || '.webm';
            
            if (evaluation?.fileName) {
                const match = evaluation.fileName.match(/^(.+?)(\.\w+)$/);
                if (match) {
                    baseName = match[1];
                }
            }
            
            return `${baseName}_mosaicked${ext}`;
        }

        function getOutputExtension(fileName) {
            const match = fileName.match(/(\.[^./\\]+)$/);
            return match ? match[1].toLowerCase() : '.webm';
        }

        function toPickerMimeType(mimeType) {
            if (!mimeType || typeof mimeType !== 'string') return 'video/webm';
            const base = mimeType.split(';')[0].trim().toLowerCase();
            return /^[a-z0-9!#$&^_.+-]+\/[a-z0-9!#$&^_.+-]+$/.test(base)
                ? base
                : 'video/webm';
        }

        function getExtensionFromMimeType(mimeType) {
            const base = toPickerMimeType(mimeType);
            if (base === 'video/mp4') return '.mp4';
            if (base === 'video/webm') return '.webm';
            return '.webm';
        }

        function estimateVideoBitrate(width, height) {
            const megapixels = (width * height) / 1_000_000;
            const estimated = Math.round(megapixels * 4_000_000);
            return Math.min(MAX_VIDEO_BITRATE, Math.max(MIN_VIDEO_BITRATE, estimated));
        }

        function getPreferredExecutionProviders() {
            const hasWebGpu = typeof navigator !== 'undefined' && !!navigator.gpu;
            return hasWebGpu ? ['webgpu', 'wasm'] : ['wasm'];
        }

        async function createProcessedOutputTarget(fileName, mimeType) {
            processedOutputMimeType = mimeType;
            processedOutputBytes = 0;
            updateModePanel();

            if (navigator.storage && typeof navigator.storage.getDirectory === 'function') {
                const root = await navigator.storage.getDirectory();
                processedOutputHandle = await root.getFileHandle(fileName, { create: true });
                processedOutputWriter = await processedOutputHandle.createWritable({ keepExistingData: false });
                addLog('出力先に OPFS を使用します。');
                return;
            }

            processedOutputHandle = null;
            processedOutputWriter = null;
            addLog('OPFS が使えないため、メモリ退避モードで出力します。');
        }

        function enqueueProcessedChunk(chunk) {
            if (!chunk || chunk.size === 0) return;

            if (processedOutputWriter) {
                processedOutputBytes += chunk.size;
                processedOutputWriteChain = processedOutputWriteChain
                    .then(() => processedOutputWriter.write(chunk))
                    .then(() => {
                        exportHint.textContent = `保存中... ${(processedOutputBytes / (1024 * 1024)).toFixed(1)} MB`;
                    })
                    .catch((error) => {
                        addLog(`出力書き込みエラー: ${error.message}`);
                    });
                return;
            }

            if (!processedOutputBlob) {
                processedOutputBlob = new Blob([chunk], { type: processedOutputMimeType });
            } else {
                processedOutputBlob = new Blob([processedOutputBlob, chunk], { type: processedOutputMimeType });
            }
            processedOutputBytes += chunk.size;
            exportHint.textContent = `メモリ保持中... ${(processedOutputBytes / (1024 * 1024)).toFixed(1)} MB`;
        }

        async function finalizeProcessedOutput() {
            if (processedOutputWriter) {
                await processedOutputWriteChain;
                await processedOutputWriter.close();
                processedOutputWriter = null;
                downloadProcessedBtn.disabled = false;
                exportHint.textContent = `保存準備OK (${(processedOutputBytes / (1024 * 1024)).toFixed(1)} MB)`;
                addLog('処理後動画の保存準備ができました。');
                return;
            }

            if (processedOutputBlob) {
                downloadProcessedBtn.disabled = false;
                exportHint.textContent = `保存準備OK (${(processedOutputBlob.size / (1024 * 1024)).toFixed(1)} MB)`;
                addLog('処理後動画の保存準備ができました。');
                return;
            }

            addLog('出力データが空でした。');
        }

        async function setupProcessedOutput(fileName) {
            if (!window.MediaRecorder || !canvas.captureStream) {
                addLog('このブラウザは動画出力に必要なAPIに対応していません。');
                exportHint.textContent = 'このブラウザでは出力できません。';
                return;
            }

            const mimeType = pickWebmMimeType();
            if (!mimeType) {
                addLog('利用可能な WebM コーデックが見つかりません。');
                exportHint.textContent = '利用可能なコーデックがありません。';
                return;
            }
            processedOutputExtension = getExtensionFromMimeType(mimeType);

            const canvasStream = canvas.captureStream(OUTPUT_CAPTURE_FPS);
            const srcStream = video.captureStream ? video.captureStream() : null;
            const audioTracks = srcStream ? srcStream.getAudioTracks() : [];
            const mixedStream = new MediaStream([
                ...canvasStream.getVideoTracks(),
                ...(audioTracks.length ? [audioTracks[0]] : []),
            ]);
            const videoBitsPerSecond = estimateVideoBitrate(canvas.width, canvas.height);

            const outputName = fileName || getBaseOutputName();
            await createProcessedOutputTarget(outputName, mimeType);

            mediaRecorder = new MediaRecorder(mixedStream, {
                mimeType,
                videoBitsPerSecond,
                audioBitsPerSecond: AUDIO_BITRATE,
            });
            mediaRecorder.ondataavailable = (event) => {
                if (event.data && event.data.size > 0) enqueueProcessedChunk(event.data);
            };
            mediaRecorder.onstop = async () => {
                try {
                    await finalizeProcessedOutput();
                } catch (error) {
                    addLog(`保存処理に失敗しました: ${error.message}`);
                    exportHint.textContent = '保存処理に失敗しました。';
                }
            };

            mediaRecorder.start(1000);
            addLog(`高画質モード: ${OUTPUT_CAPTURE_FPS}fps / ${(videoBitsPerSecond / 1_000_000).toFixed(1)}Mbps`);
            addLog(`保存ファイル名の拡張子は ${sourceVideoExtension} を維持します。`);
            addLog('モザイク済み動画の書き出しを開始しました。');
        }

        downloadProcessedBtn.addEventListener('click', async () => {
            let blob = null;
            if (processedOutputHandle) {
                blob = await processedOutputHandle.getFile();
            } else if (processedOutputBlob) {
                blob = processedOutputBlob;
            }

            if (!blob) return;

            const outputName = getBaseOutputName();
            if (window.showSaveFilePicker) {
                try {
                    const outputExt = getOutputExtension(outputName);
                    const pickerMimeType = toPickerMimeType(processedOutputMimeType);
                    const pickerOptions = {
                        suggestedName: outputName,
                        types: [{
                            description: 'Video file',
                            accept: {
                                [pickerMimeType]: [outputExt],
                            },
                        }],
                    };
                    if (sourceVideoFileHandle) {
                        pickerOptions.startIn = sourceVideoFileHandle;
                    }

                    const saveHandle = await window.showSaveFilePicker(pickerOptions);
                    const writable = await saveHandle.createWritable();
                    await writable.write(blob);
                    await writable.close();
                    addLog(`保存完了: ${saveHandle.name}`);
                    return;
                } catch (error) {
                    if (error && error.name === 'AbortError') return;
                    addLog(`保存ダイアログでの保存に失敗したため通常保存に切り替えます: ${error.message}`);
                }
            }

            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = outputName;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
        });

        function addLog(message) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerText = `> ${message}`;
            logPanel.appendChild(entry);
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function logRuntimeCompatibility() {
            const hasGpu = typeof navigator !== 'undefined' && !!navigator.gpu;
            const hasMediaRecorder = !!window.MediaRecorder;
            const hasCanvasCapture = !!canvas.captureStream;
            const hasVideoCapture = !!video.captureStream;
            const hasSavePicker = !!window.showSaveFilePicker;
            addLog(`環境: ${navigator.platform || 'unknown'} / ${navigator.userAgent}`);
            addLog(`互換性: WebGPU=${hasGpu ? 'OK' : 'NG(wasmで動作)'} / MediaRecorder=${hasMediaRecorder ? 'OK' : 'NG'} / CanvasCapture=${hasCanvasCapture ? 'OK' : 'NG'} / VideoCapture=${hasVideoCapture ? 'OK' : 'NG'} / SavePicker=${hasSavePicker ? 'OK' : 'NG'}`);
        }

        function getFiniteDurationSeconds(media) {
            const duration = Number(media?.duration);
            return Number.isFinite(duration) && duration > 0 ? duration : 0;
        }

        function startEvaluation(fileName) {
            evaluation = {
                fileName,
                detectorMode: DETECTOR_MODE,
                startedAt: new Date().toISOString(),
                startedAtMs: performance.now(),
                frames: 0,
                framesWithDetection: 0,
                totalDetections: 0,
                latenciesMs: [],
                records: [],
                estimatedTotalFrames: 0
            };
        }

        function recordEvaluationFrame(drawnCount, latencyMs) {
            if (!evaluation) return;

            evaluation.frames += 1;
            if (drawnCount > 0) evaluation.framesWithDetection += 1;
            evaluation.totalDetections += drawnCount;
            evaluation.latenciesMs.push(latencyMs);
            evaluation.records.push({
                frameIndex: evaluation.frames,
                detectionCount: drawnCount,
                hasDetection: drawnCount > 0,
                latencyMs: Number(latencyMs.toFixed(3))
            });

            const elapsedMs = performance.now() - evaluation.startedAtMs;
            const elapsedSec = elapsedMs / 1000;
            const processingSpeed = evaluation.frames / (elapsedSec || 1);
            if (evaluation.estimatedTotalFrames > 0) {
                const remainingFrames = Math.max(0, evaluation.estimatedTotalFrames - evaluation.frames);
                const estimatedRemainingSec = Math.max(0, remainingFrames / (processingSpeed || 1));
                const remainingText = estimatedRemainingSec > 0
                    ? ` (残り約 ${Math.ceil(estimatedRemainingSec)}s)`
                    : '';
                statusText.innerText = `処理中... ${evaluation.frames} / ${evaluation.estimatedTotalFrames} フレーム | ${processingSpeed.toFixed(1)} fps${remainingText}`;
            } else {
                statusText.innerText = `処理中... ${evaluation.frames} フレーム | ${processingSpeed.toFixed(1)} fps (動画時間不明)`;
            }

            const progressPercent = evaluation.estimatedTotalFrames > 0
                ? (evaluation.frames / evaluation.estimatedTotalFrames) * 100
                : 0;
            progressBar.style.width = `${Math.min(progressPercent, 100)}%`;
        }

        function finalizeEvaluation() {
            if (!evaluation) return null;

            const latencies = evaluation.latenciesMs.slice().sort((a, b) => a - b);
            const averageLatencyMs = latencies.length
                ? latencies.reduce((a, b) => a + b, 0) / latencies.length
                : 0;
            const p95LatencyMs = latencies.length
                ? latencies[Math.min(latencies.length - 1, Math.floor(latencies.length * 0.95))]
                : 0;
            const detectionFrameRate = evaluation.frames > 0
                ? evaluation.framesWithDetection / evaluation.frames
                : 0;

            evaluation.finishedAt = new Date().toISOString();
            evaluation.summary = {
                detectionFrameRate,
                averageLatencyMs,
                p95LatencyMs,
                averageDetectionsPerFrame: evaluation.frames > 0
                    ? evaluation.totalDetections / evaluation.frames
                    : 0
            };

            window.latestEvaluation = evaluation;
            return evaluation;
        }

        function getDetectionScore(detection) {
            if (Array.isArray(detection.score) && Number.isFinite(detection.score[0])) return detection.score[0];
            if (Number.isFinite(detection.score)) return detection.score;
            if (Number.isFinite(detection.confidence)) return detection.confidence;
            if (Number.isFinite(detection.probability)) return detection.probability;
            if (Array.isArray(detection.categories) && Number.isFinite(detection.categories[0]?.score)) {
                return detection.categories[0].score;
            }
            return NaN;
        }

        function getRawBBox(detection) {
            const primary = detection.boundingBox;
            const relative = detection.locationData?.relativeBoundingBox;
            const source = primary || relative;
            if (!source) return null;

            const x = Number.isFinite(source.xMin)
                ? source.xMin
                : Number.isFinite(source.xmin)
                    ? source.xmin
                    : (Number.isFinite(source.xCenter) && Number.isFinite(source.width)
                        ? source.xCenter - source.width / 2
                        : NaN);
            const y = Number.isFinite(source.yMin)
                ? source.yMin
                : Number.isFinite(source.ymin)
                    ? source.ymin
                    : (Number.isFinite(source.yCenter) && Number.isFinite(source.height)
                        ? source.yCenter - source.height / 2
                        : NaN);
            const w = Number.isFinite(source.width) ? source.width : NaN;
            const h = Number.isFinite(source.height) ? source.height : NaN;

            if (![x, y, w, h].every(Number.isFinite)) return null;
            return { x, y, w, h };
        }

        function normalizeAndClampBBox(x, y, w, h) {
            let nx = x;
            let ny = y;
            let nw = w;
            let nh = h;

            if (nx < 0) {
                nw += nx;
                nx = 0;
            }
            if (ny < 0) {
                nh += ny;
                ny = 0;
            }
            if (nx + nw > 1) nw = 1 - nx;
            if (ny + nh > 1) nh = 1 - ny;

            if (nw <= 0 || nh <= 0) return null;
            return { x: nx, y: ny, w: nw, h: nh };
        }

        function drawBBox(x, y, w, h, score) {
            ctx.strokeStyle = '#00FF00';
            ctx.lineWidth = 4;
            ctx.strokeRect(x, y, w, h);

            const hasScore = Number.isFinite(score);
            const text = hasScore ? `Face: ${Math.round(score * 100)}%` : 'Face';

            ctx.fillStyle = '#00FF00';
            ctx.fillRect(x, y - 25, 100, 25);

            ctx.fillStyle = '#000000';
            ctx.font = 'bold 14px sans-serif';
            ctx.fillText(text, x + 5, y - 8);
        }

        function mosaicBBox(x, y, w, h) {
            const ix = Math.max(0, Math.floor(x));
            const iy = Math.max(0, Math.floor(y));
            const iw = Math.min(canvas.width - ix, Math.floor(w));
            const ih = Math.min(canvas.height - iy, Math.floor(h));
            if (iw <= 1 || ih <= 1) return;

            // Smaller block size gives a finer mosaic (less coarse appearance).
            const blockSize = Math.min(
                MOSAIC_MAX_BLOCK,
                Math.max(MOSAIC_MIN_BLOCK, Math.round(Math.min(iw, ih) / MOSAIC_DIVISOR))
            );
            const smallW = Math.max(1, Math.floor(iw / blockSize));
            const smallH = Math.max(1, Math.floor(ih / blockSize));

            const srcPatch = document.createElement('canvas');
            srcPatch.width = iw;
            srcPatch.height = ih;
            const srcCtx = srcPatch.getContext('2d');
            srcCtx.drawImage(canvas, ix, iy, iw, ih, 0, 0, iw, ih);

            const facePatch = document.createElement('canvas');
            facePatch.width = iw;
            facePatch.height = ih;
            const patchCtx = facePatch.getContext('2d');

            const tinyPatch = document.createElement('canvas');
            tinyPatch.width = smallW;
            tinyPatch.height = smallH;
            const tinyCtx = tinyPatch.getContext('2d');

            const prevSmoothing = ctx.imageSmoothingEnabled;
            // Use nearest-neighbor upscaling so the mosaic is clearly visible.
            tinyCtx.imageSmoothingEnabled = false;
            patchCtx.imageSmoothingEnabled = false;
            ctx.imageSmoothingEnabled = false;
            tinyCtx.drawImage(srcPatch, 0, 0, iw, ih, 0, 0, smallW, smallH);
            patchCtx.drawImage(tinyPatch, 0, 0, smallW, smallH, 0, 0, iw, ih);
            ctx.imageSmoothingEnabled = prevSmoothing;

            // Add a light gaussian-like blur pass so the effect is visible even on small boxes.
            const blurred = document.createElement('canvas');
            blurred.width = iw;
            blurred.height = ih;
            const blurredCtx = blurred.getContext('2d');
            blurredCtx.save();
            blurredCtx.filter = `blur(${FACE_BLUR_RADIUS}px)`;
            blurredCtx.drawImage(facePatch, 0, 0);
            blurredCtx.restore();

            const feather = Math.max(4, Math.round(Math.min(iw, ih) * EDGE_FEATHER_RATIO));
            const mask = document.createElement('canvas');
            mask.width = iw;
            mask.height = ih;
            const maskCtx = mask.getContext('2d');
            maskCtx.fillStyle = 'rgba(0, 0, 0, 1)';
            maskCtx.fillRect(0, 0, iw, ih);

            maskCtx.globalCompositeOperation = 'destination-out';

            const topGrad = maskCtx.createLinearGradient(0, 0, 0, feather);
            topGrad.addColorStop(0, 'rgba(0,0,0,1)');
            topGrad.addColorStop(1, 'rgba(0,0,0,0)');
            maskCtx.fillStyle = topGrad;
            maskCtx.fillRect(0, 0, iw, feather);

            const bottomGrad = maskCtx.createLinearGradient(0, ih - feather, 0, ih);
            bottomGrad.addColorStop(0, 'rgba(0,0,0,0)');
            bottomGrad.addColorStop(1, 'rgba(0,0,0,1)');
            maskCtx.fillStyle = bottomGrad;
            maskCtx.fillRect(0, ih - feather, iw, feather);

            const leftGrad = maskCtx.createLinearGradient(0, 0, feather, 0);
            leftGrad.addColorStop(0, 'rgba(0,0,0,1)');
            leftGrad.addColorStop(1, 'rgba(0,0,0,0)');
            maskCtx.fillStyle = leftGrad;
            maskCtx.fillRect(0, 0, feather, ih);

            const rightGrad = maskCtx.createLinearGradient(iw - feather, 0, iw, 0);
            rightGrad.addColorStop(0, 'rgba(0,0,0,0)');
            rightGrad.addColorStop(1, 'rgba(0,0,0,1)');
            maskCtx.fillStyle = rightGrad;
            maskCtx.fillRect(iw - feather, 0, feather, ih);

            blurredCtx.globalCompositeOperation = 'destination-in';
            blurredCtx.drawImage(mask, 0, 0);

            ctx.save();
            ctx.globalCompositeOperation = 'source-over';
            ctx.drawImage(blurred, ix, iy, iw, ih);
            ctx.restore();
        }

        function renderDetections(detections) {
            let drawnCount = 0;
            for (const det of detections) {
                const x = det.x * canvas.width;
                const y = det.y * canvas.height;
                const w = det.w * canvas.width;
                const h = det.h * canvas.height;
                if (w > 0 && h > 0) {
                    const padX = w * FACE_EXPAND_X_RATIO;
                    const padTop = h * FACE_EXPAND_TOP_RATIO;
                    const padBottom = h * FACE_EXPAND_BOTTOM_RATIO;

                    const ex = Math.max(0, x - padX);
                    const ey = Math.max(0, y - padTop);
                    const ex2 = Math.min(canvas.width, x + w + padX);
                    const ey2 = Math.min(canvas.height, y + h + padBottom);
                    const ew = ex2 - ex;
                    const eh = ey2 - ey;

                    mosaicBBox(ex, ey, ew, eh);
                    if (DRAW_BBOX_OUTLINE) {
                        drawBBox(ex, ey, ew, eh, det.score);
                    }
                    drawnCount += 1;
                }
            }
            return drawnCount;
        }

        class MediaPipeDetector {
            constructor() {
                this.instance = null;
                this.pendingResolve = null;
                this.pendingTimeout = null;
            }

            async init() {
                addLog('MediaPipe モデルをダウンロード中...');
                this.instance = new FaceDetection({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}` });
                this.instance.setOptions({
                    model: 'short',
                    minDetectionConfidence: 0.2
                });
                this.instance.onResults((results) => {
                    if (this.pendingTimeout) clearTimeout(this.pendingTimeout);
                    const parsed = this.parseResults(results);
                    if (this.pendingResolve) {
                        this.pendingResolve(parsed);
                        this.pendingResolve = null;
                    }
                });
                await this.instance.initialize();
            }

            parseResults(results) {
                const output = [];
                if (!results.detections || results.detections.length === 0) return output;

                for (const detection of results.detections) {
                    const rawBBox = getRawBBox(detection);
                    if (!rawBBox) continue;

                    const score = getDetectionScore(detection);
                    if (Number.isFinite(score) && score < DISPLAY_SCORE_THRESHOLD) continue;

                    const normalized = normalizeAndClampBBox(rawBBox.x, rawBBox.y, rawBBox.w, rawBBox.h);
                    if (!normalized) continue;

                    output.push({
                        x: normalized.x,
                        y: normalized.y,
                        w: normalized.w,
                        h: normalized.h,
                        score
                    });
                }
                return output;
            }

            async detect(image) {
                return new Promise(async (resolve, reject) => {
                    this.pendingResolve = resolve;
                    this.pendingTimeout = setTimeout(() => {
                        if (this.pendingResolve) {
                            this.pendingResolve([]);
                            this.pendingResolve = null;
                        }
                    }, 1000);
                    try {
                        await this.instance.send({ image });
                    } catch (error) {
                        if (this.pendingTimeout) clearTimeout(this.pendingTimeout);
                        this.pendingResolve = null;
                        reject(error);
                    }
                });
            }

            async dispose() {
                if (this.instance && typeof this.instance.close === 'function') {
                    this.instance.close();
                }
            }
        }

        class ScrfdDetector {
            constructor() {
                this.session = null;
                this.INPUT_SIZE = 640;
                this.STRIDES = [8, 16, 32];
                this.NUM_ANCHORS = 2;
                // Output node names from model inspection
                this.OUTPUT_NAMES = {
                    8:  { score: '443', bbox: '446' },
                    16: { score: '468', bbox: '471' },
                    32: { score: '493', bbox: '496' },
                };
            }

            async init() {
                if (!window.ort) throw new Error('onnxruntime-web のロードに失敗しました。');

                if (window.ort?.env?.wasm) {
                    // Keep CPU fallback as fast as possible on non-GPU machines.
                    window.ort.env.wasm.simd = true;
                    if (window.crossOriginIsolated) {
                        window.ort.env.wasm.numThreads = Math.min(4, navigator.hardwareConcurrency || 2);
                    } else {
                        window.ort.env.wasm.numThreads = 1;
                    }
                }

                if (window.location.protocol === 'file:') {
                    throw new Error(
                        'file:// で開くとSCRFDモデルを取得できません。' +
                        ' http://localhost:8765/demo.html で開いてください。'
                    );
                }

                const modelCandidates = Array.from(new Set([
                    SCRFD_MODEL_URL,
                    './models/det_500m.onnx',
                    '/models/det_500m.onnx',
                    `${window.location.origin}/models/det_500m.onnx`,
                ]));

                let lastError = null;
                const executionProviders = getPreferredExecutionProviders();
                activeProviderLabel = executionProviders.join(' -> ');
                updateModePanel();
                addLog(`SCRFD 実行プロバイダ: ${executionProviders.join(' -> ')}`);
                for (const modelUrl of modelCandidates) {
                    addLog(`SCRFD モデルをロード中: ${modelUrl}`);
                    for (let attempt = 1; attempt <= 3; attempt++) {
                        try {
                            const response = await fetch(modelUrl, { cache: 'no-store' });
                            if (!response.ok) {
                                throw new Error(`HTTP ${response.status}`);
                            }

                            const modelBuffer = await response.arrayBuffer();
                            this.session = await ort.InferenceSession.create(modelBuffer, {
                                executionProviders,
                            });
                            scrfdSessionReady = true;
                            scrfdLastError = '';
                            updateModePanel();
                            addLog('SCRFD セッション初期化完了。');
                            return;
                        } catch (error) {
                            lastError = error;
                            scrfdLastError = error.message;
                            updateModePanel();
                            addLog(`SCRFD ロード失敗 (${attempt}/3): ${error.message}`);
                        }
                    }
                }

                throw new Error(`SCRFDモデルの取得に失敗しました: ${lastError?.message || 'unknown error'}`);
            }

            _preprocess(imageElement) {
                const S = this.INPUT_SIZE;
                const offscreen = document.createElement('canvas');
                offscreen.width = S;
                offscreen.height = S;
                const ctx2 = offscreen.getContext('2d');
                ctx2.fillStyle = 'black';
                ctx2.fillRect(0, 0, S, S);

                const srcW = imageElement.videoWidth || imageElement.width;
                const srcH = imageElement.videoHeight || imageElement.height;
                const imRatio = srcH / srcW;
                const modelRatio = 1.0;
                let newW;
                let newH;
                if (imRatio > modelRatio) {
                    newH = S;
                    newW = Math.round(newH / imRatio);
                } else {
                    newW = S;
                    newH = Math.round(newW * imRatio);
                }

                ctx2.drawImage(imageElement, 0, 0, newW, newH);
                const { data } = ctx2.getImageData(0, 0, S, S);
                const N = S * S;
                const tensor = new Float32Array(3 * N);
                for (let i = 0; i < N; i++) {
                    tensor[i]         = (data[i * 4]     - 127.5) / 128.0; // R
                    tensor[N + i]     = (data[i * 4 + 1] - 127.5) / 128.0; // G
                    tensor[2 * N + i] = (data[i * 4 + 2] - 127.5) / 128.0; // B
                }
                return {
                    tensor: new ort.Tensor('float32', tensor, [1, 3, S, S]),
                    srcW,
                    srcH,
                    detScale: newH / srcH,
                    resizedW: newW,
                    resizedH: newH,
                };
            }

            _generateAnchors(stride) {
                const size = this.INPUT_SIZE / stride;
                const centers = [];
                for (let i = 0; i < size; i++) {
                    for (let j = 0; j < size; j++) {
                        for (let a = 0; a < this.NUM_ANCHORS; a++) {
                            centers.push(j * stride, i * stride);
                        }
                    }
                }
                return centers; // flat [cx, cy, cx, cy, ...]
            }

            _decodeStride(scores, bboxes, stride, threshold) {
                const anchors = this._generateAnchors(stride);
                const results = [];
                const n = scores.length;
                for (let i = 0; i < n; i++) {
                    const score = scores[i];
                    if (score < threshold) continue;
                    const cx = anchors[i * 2];
                    const cy = anchors[i * 2 + 1];
                    // SCRFD bbox output is stride-relative distances [l, t, r, b].
                    const l = bboxes[i * 4] * stride;
                    const t = bboxes[i * 4 + 1] * stride;
                    const r = bboxes[i * 4 + 2] * stride;
                    const b = bboxes[i * 4 + 3] * stride;
                    results.push({
                        x1: cx - l,
                        y1: cy - t,
                        x2: cx + r,
                        y2: cy + b,
                        score,
                    });
                }
                return results;
            }

            _iou(a, b) {
                const ix1 = Math.max(a.x1, b.x1);
                const iy1 = Math.max(a.y1, b.y1);
                const ix2 = Math.min(a.x2, b.x2);
                const iy2 = Math.min(a.y2, b.y2);
                const inter = Math.max(0, ix2 - ix1) * Math.max(0, iy2 - iy1);
                if (inter === 0) return 0;
                const aA = (a.x2 - a.x1) * (a.y2 - a.y1);
                const bA = (b.x2 - b.x1) * (b.y2 - b.y1);
                return inter / (aA + bA - inter);
            }

            _nms(boxes, iouThreshold = 0.45) {
                boxes.sort((a, b) => b.score - a.score);
                const suppressed = new Uint8Array(boxes.length);
                const keep = [];
                for (let i = 0; i < boxes.length; i++) {
                    if (suppressed[i]) continue;
                    keep.push(boxes[i]);
                    for (let j = i + 1; j < boxes.length; j++) {
                        if (!suppressed[j] && this._iou(boxes[i], boxes[j]) > iouThreshold) {
                            suppressed[j] = 1;
                        }
                    }
                }
                return keep;
            }

            async detect(imageElement) {
                if (!this.session) return [];
                const S = this.INPUT_SIZE;
                const prep = this._preprocess(imageElement);
                const outputs = await this.session.run({ 'input.1': prep.tensor });

                const allBoxes = [];
                for (const stride of this.STRIDES) {
                    const { score: sName, bbox: bName } = this.OUTPUT_NAMES[stride];
                    const decoded = this._decodeStride(
                        outputs[sName].data,
                        outputs[bName].data,
                        stride,
                        DISPLAY_SCORE_THRESHOLD
                    );
                    allBoxes.push(...decoded);
                }

                const finalBoxes = this._nms(allBoxes);
                return finalBoxes.map(b => ({
                    x: Math.max(0, b.x1 / prep.detScale) / prep.srcW,
                    y: Math.max(0, b.y1 / prep.detScale) / prep.srcH,
                    w: (
                        Math.min(prep.srcW, b.x2 / prep.detScale) -
                        Math.max(0, b.x1 / prep.detScale)
                    ) / prep.srcW,
                    h: (
                        Math.min(prep.srcH, b.y2 / prep.detScale) -
                        Math.max(0, b.y1 / prep.detScale)
                    ) / prep.srcH,
                    score: b.score,
                })).filter(d => d.w > 0 && d.h > 0);
            }

            async dispose() {
                this.session = null;
            }
        }

        async function createDetectorByMode(mode) {
            if (mode === 'candidate_scrfd' || mode === 'candidate_scrfd_500m') return new ScrfdDetector();
            if (mode === 'baseline_mediapipe') return new MediaPipeDetector();
            return new ScrfdDetector(); // デフォルト
        }

        async function initializeDetector() {
            logRuntimeCompatibility();
            activeDetectorModeLabel = getDetectorModeLabel(DETECTOR_MODE);
            activeProviderLabel = '初期化中';
            updateModePanel();
            try {
                detector = await createDetectorByMode(DETECTOR_MODE);
                await detector.init();
                activeDetectorModeLabel = getDetectorModeLabel(DETECTOR_MODE);
                addLog(`検出器モード: ${DETECTOR_MODE}`);
            } catch (error) {
                addLog(`警告: ${DETECTOR_MODE} の初期化に失敗 (${error.message})`);
                addLog('baseline_mediapipe にフォールバックします。');
                detector = new MediaPipeDetector();
                await detector.init();
                activeDetectorModeLabel = 'MediaPipe (fallback)';
                activeProviderLabel = 'browser runtime';
            }

            updateModePanel();
            addLog('準備完了！動画をドロップしてください。');
            statusText.innerText = 'READY';
            statusBar.style.backgroundColor = '#28a745';
        }

        initializeDetector().catch((err) => {
            addLog(`致命的エラー: ${err.message}`);
            statusText.innerText = 'ERROR';
            statusBar.style.backgroundColor = '#dc3545';
        });

        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

        dropZone.addEventListener('drop', async (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');

            const file = e.dataTransfer.files[0];
            if (!file || !file.type.startsWith('video/')) {
                addLog('エラー: 動画ファイルを選択してください。');
                return;
            }
            sourceVideoExtension = getOutputExtension(file.name);
            scrfdLastDetections = 0;
            scrfdNoDetectionStreak = 0;
            scrfdLastError = '';
            updateModePanel();

            sourceVideoFileHandle = null;
            const firstItem = e.dataTransfer.items && e.dataTransfer.items[0];
            if (firstItem && typeof firstItem.getAsFileSystemHandle === 'function') {
                try {
                    const handle = await firstItem.getAsFileSystemHandle();
                    if (handle && handle.kind === 'file') {
                        sourceVideoFileHandle = handle;
                        addLog('保存時の初期フォルダに入力動画の場所を使用します。');
                    }
                } catch (error) {
                    addLog(`入力動画のフォルダ情報を取得できませんでした: ${error.message}`);
                }
            }

            addLog(`ファイル読み込み: ${file.name}`);
            statusText.innerText = 'PROCESSING...';
            statusBar.classList.add('processing');
            progressBar.style.width = '0%';
            startEvaluation(file.name);
            resetExportState();

            inputVideoUrl = URL.createObjectURL(file);
            video.src = inputVideoUrl;

            video.onloadeddata = async () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                frameSnapshotCanvas = document.createElement('canvas');
                frameSnapshotCanvas.width = canvas.width;
                frameSnapshotCanvas.height = canvas.height;
                frameSnapshotCtx = frameSnapshotCanvas.getContext('2d', { willReadFrequently: true });
                addLog(`解像度設定: ${canvas.width}x${canvas.height}`);
                const durationSec = getFiniteDurationSeconds(video);
                evaluation.estimatedTotalFrames = durationSec > 0
                    ? Math.max(1, Math.round(durationSec * OUTPUT_CAPTURE_FPS))
                    : 0;
                if (durationSec > 0) {
                    addLog(`動画時間: ${durationSec.toFixed(1)}秒 (推定フレーム数: ${evaluation.estimatedTotalFrames})`);
                } else {
                    addLog('動画時間: 不明 (推定フレーム数を計算できません)');
                }

                await setupProcessedOutput(file.name);

                video.play();
                isProcessing = true;
                processVideoFrame();
            };
        });

        async function processVideoFrame() {
            if (!isProcessing || video.paused || video.ended) return;

            if (!frameSnapshotCanvas || !frameSnapshotCtx) {
                frameSnapshotCanvas = document.createElement('canvas');
                frameSnapshotCanvas.width = canvas.width;
                frameSnapshotCanvas.height = canvas.height;
                frameSnapshotCtx = frameSnapshotCanvas.getContext('2d', { willReadFrequently: true });
            }

            frameSnapshotCtx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const startedAt = performance.now();
            let detections = [];
            try {
                detections = await detector.detect(frameSnapshotCanvas);
            } catch (error) {
                addLog(`顔検出エラー: ${error.message}`);
                if (detector instanceof ScrfdDetector) {
                    scrfdLastError = error.message;
                }
            }
            if (detector instanceof ScrfdDetector) {
                const detCount = Array.isArray(detections) ? detections.length : 0;
                scrfdLastDetections = detCount;
                scrfdNoDetectionStreak = detCount > 0 ? 0 : (scrfdNoDetectionStreak + 1);
                if (scrfdNoDetectionStreak > 0 && scrfdNoDetectionStreak % 60 === 0) {
                    addLog(`SCRFD診断: ${scrfdNoDetectionStreak}フレーム連続で未検出です。`);
                }
                updateModePanel();
            }
            const latencyMs = performance.now() - startedAt;
            ctx.drawImage(frameSnapshotCanvas, 0, 0, canvas.width, canvas.height);
            const drawnCount = renderDetections(detections || []);
            recordEvaluationFrame(drawnCount, latencyMs);

            requestAnimationFrame(processVideoFrame);
        }

        video.onended = async () => {
            isProcessing = false;
            statusBar.classList.remove('processing');
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            addLog('動画の再生と解析が完了しました。');
            const report = finalizeEvaluation();
            if (report && report.summary) {
                const detectionRatePercent = Math.round(report.summary.detectionFrameRate * 1000) / 10;
                addLog(`評価: 検出フレーム率 ${detectionRatePercent}% / p95遅延 ${report.summary.p95LatencyMs.toFixed(1)}ms`);
            }
            statusText.innerText = '完了！';
            statusBar.classList.remove('processing');
            statusBar.style.backgroundColor = '#28a745';
            progressBar.style.width = '100%';
            if (inputVideoUrl) {
                URL.revokeObjectURL(inputVideoUrl);
                inputVideoUrl = null;
            }
        };
    </script>
